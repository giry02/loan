<!DOCTYPE html>
<html class="h-full" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport" />
    <title>대출신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet" />
    <link href="css/common.css" rel="stylesheet" />
</head>

<body class="h-full w-full bg-white overflow-hidden flex flex-col">
    <!-- 상단 헤더 -->
    <div class="pt-4 px-4 pb-2 bg-white z-30 flex justify-between items-center h-14 shrink-0 relative border-b border-gray-100">
        <button class="p-2 -ml-2 text-gray-800 active:bg-gray-100 rounded-full transition-colors z-10" onclick="history.back()">
            <i class="w-7 h-7" data-lucide="chevron-left"></i>
        </button>
        <h1 class="absolute left-1/2 -translate-x-1/2 text-[18px] font-bold text-gray-900 flex items-center">대출신청</h1>
        <div class="flex items-center gap-1 cursor-pointer px-2 py-1 z-10" onclick="location.href='../index.html'">
            <span class="text-sm font-bold text-gray-900">종료</span>
            <i class="text-gray-900 w-4 h-4" data-lucide="phone-off"></i>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="flex-1 overflow-y-auto scrollbar-hide px-6 pt-4 relative flex flex-col scroll-smooth" id="main-scroll-container">
        <!-- 타이핑 텍스트 영역 -->
        <div class="min-h-[30px] flex items-center justify-start join-typing-area shrink-0" id="typing-area">
            <span class="text-[#5031E5] font-bold text-[17px]" id="typing-text"></span>
            <span class="inline-block w-[2px] h-5 bg-[#5031E5] ml-1 cursor-blink" id="cursor"></span>
        </div>

        <!-- 바운스 콘텐츠 -->
        <div class="w-full opacity-0" id="main-content-body">
            <div class="flex flex-col h-full bg-white px-1">
                <div class="mb-8 pt-4">
                    <h2 class="text-[20px] font-bold text-[#1a1a1a] leading-tight px-1">
                        본인확인을 위한 본인 인증은<br>신용점수에 <span class="text-[#5031E5]">영향이 없습니다</span>
                    </h2>
                </div>

                <!-- 통신사 선택 -->
                <div class="mb-6">
                    <label class="block text-[14px] font-bold text-gray-800 mb-3 ml-1">이용 중인 통신사</label>
                    <div class="grid grid-cols-2 gap-2" id="telecom-grid">
                        <div class="border border-gray-200 rounded-xl py-3 text-center cursor-pointer font-bold text-[15px] text-gray-700 active:scale-95 transition-all w-full tele-btn" onclick="selectTelecom(this, 'skt')">SKT</div>
                        <div class="border border-gray-200 rounded-xl py-3 text-center cursor-pointer font-bold text-[15px] text-gray-700 active:scale-95 transition-all w-full tele-btn" onclick="selectTelecom(this, 'kt')">KT</div>
                        <div class="border border-gray-200 rounded-xl py-3 text-center cursor-pointer font-bold text-[15px] text-gray-700 active:scale-95 transition-all w-full tele-btn" onclick="selectTelecom(this, 'lgu')">LG U+</div>
                        <div class="border border-gray-200 rounded-xl py-3 text-center cursor-pointer font-bold text-[15px] text-gray-700 active:scale-95 transition-all w-full tele-btn" onclick="selectTelecom(this, 'altteul')">알뜰폰</div>
                    </div>
                </div>
                <!-- 휴대폰 번호 입력 -->
                <div class="mb-4">
                    <label class="block text-[14px] font-bold text-gray-800 mb-2 ml-1">휴대폰 번호</label>
                    <input type="tel" id="phone" placeholder="'-' 없이 숫자만 입력" maxlength="11" class="w-full py-4 text-[18px] border-b border-gray-200 focus:border-[#5031E5] outline-none transition-colors placeholder:text-gray-300 font-medium text-gray-900 bg-transparent rounded-none" oninput="checkInput()">
                </div>
                <!-- 약관 동의 -->
                <div class="mb-8 flex items-center gap-2 cursor-pointer mt-4" onclick="toggleAgree()">
                    <div id="check-icon" class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition-colors">
                        <i data-lucide="check" class="w-4 h-4 text-white opacity-0 transition-opacity" id="check-mark"></i>
                    </div>
                    <span class="text-[14px] font-medium text-gray-700">본인확인 필수 약관 전체 동의</span>
                </div>

                <!-- 하단 버튼 -->
                <div class="mt-auto pt-4 pb-10">
                    <button id="next-btn" class="w-full bg-[#E5E7EB] text-gray-400 py-4 rounded-xl text-[18px] font-bold transition-all pointer-events-none" onclick="goNext()">
                        다음
                    </button>
                </div>
            </div>
        </div>
        <div class="w-full h-8 shrink-0" id="bottom-spacer"></div>
    </div>

    <script src="js/agent_overlay.js"></script>
    <script src="js/common_ui.js"></script>
    <script>
        const pageText = "전화번호를 입력하시고 인증번호를 받아주세요.";
        initCommonUI(pageText);

        let isTelecomSelected = false;
        let isAgreed = false;
        document.getElementById('next-btn').innerText = '인증번호 요청';
        function selectTelecom(el, type) {
            document.querySelectorAll('.tele-btn').forEach(btn => {
                btn.classList.remove('border-[#5031E5]', 'text-[#5031E5]', 'bg-indigo-50');
                btn.classList.add('border-gray-200', 'text-gray-700');
            });
            el.classList.remove('border-gray-200', 'text-gray-700');
            el.classList.add('border-[#5031E5]', 'text-[#5031E5]', 'bg-indigo-50');
            isTelecomSelected = true;
            checkInput();
        }
        function toggleAgree() {
            isAgreed = !isAgreed;
            const icon = document.getElementById('check-icon');
            const mark = document.getElementById('check-mark');
            if (isAgreed) {
                icon.classList.replace('border-gray-300', 'bg-[#5031E5]');
                icon.classList.replace('border-2', 'border-0');
                mark.classList.remove('opacity-0');
            } else {
                icon.classList.replace('bg-[#5031E5]', 'border-gray-300');
                icon.classList.replace('border-0', 'border-2');
                mark.classList.add('opacity-0');
            }
            checkInput();
        }
        function checkInput() {
            const phone = document.getElementById('phone');
            phone.value = phone.value.replace(/[^0-9]/g, '');
            const btn = document.getElementById('next-btn');
            if (isTelecomSelected && isAgreed && phone.value.length >= 10) {
                btn.classList.remove('bg-[#E5E7EB]', 'text-gray-400', 'pointer-events-none');
                btn.classList.add('bg-[#5031E5]', 'text-white', 'shadow-lg', 'active:scale-95');
            } else {
                btn.classList.add('bg-[#E5E7EB]', 'text-gray-400', 'pointer-events-none');
                btn.classList.remove('bg-[#5031E5]', 'text-white', 'shadow-lg', 'active:scale-95');
            }
        }
        function goNext() {
            location.href = 'step04_auth_code.html';
        }
    </script>
</body>

</html>
