<!DOCTYPE html>
<html class="h-full" lang="ko">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport" />
    <title>금융 서비스 허브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .menu-card:active { transform: scale(0.97); transition: transform 0.1s; }
    </style>
</head>

<body class="h-full w-full bg-gray-50 overflow-hidden flex flex-col">
    <!-- 상단 헤더 -->
    <div class="pt-6 px-6 pb-4 bg-white z-30 flex justify-between items-center shrink-0">
        <h1 class="text-[22px] font-extrabold text-gray-900 tracking-tight flex items-center gap-2">
            <i class="w-7 h-7 text-[#5031E5]" data-lucide="landmark"></i>
            AI 뱅킹
        </h1>
        <div class="flex items-center gap-3 text-gray-800">
            <i class="w-6 h-6" data-lucide="bell"></i>
            <i class="w-6 h-6" data-lucide="menu"></i>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="flex-1 overflow-y-auto px-5 pt-8 pb-20 scroll-smooth">
        
        <div class="mb-8">
            <p class="text-gray-500 font-medium mb-1">반갑습니다, 고객님!</p>
            <h2 class="text-[26px] font-bold text-gray-900 leading-tight">
                어떤 금융 서비스가<br>필요하신가요?
            </h2>
        </div>

        <div class="flex flex-col gap-4">
            <!-- 대출 신청 (실제 연결됨) -->
            <div class="bg-white rounded-2xl p-6 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 flex items-center gap-5 cursor-pointer menu-card w-full" onclick="location.href='step01_intro.html'">
                <div class="w-14 h-14 bg-[#EEF2FF] rounded-full flex shrink-0 items-center justify-center text-[#5031E5]">
                    <i class="w-7 h-7" data-lucide="coins"></i>
                </div>
                <div>
                    <h3 class="font-bold text-[18px] text-gray-900 mb-1">대출 신청</h3>
                    <p class="text-[14px] text-gray-500 font-medium">최저 금리 한도 확인</p>
                </div>
                <div class="ml-auto text-gray-300">
                    <i class="w-6 h-6" data-lucide="chevron-right"></i>
                </div>
            </div>

            <!-- 내 계좌 조회 (비활성화 더미) -->
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 flex items-center gap-5 w-full opacity-60">
                <div class="w-14 h-14 bg-gray-200 rounded-full flex shrink-0 items-center justify-center text-gray-400">
                    <i class="w-7 h-7" data-lucide="wallet"></i>
                </div>
                <div>
                    <h3 class="font-bold text-[18px] text-gray-500 mb-1">내 계좌 조회</h3>
                    <p class="text-[14px] text-gray-400 font-medium">잔액 및 거래 내역</p>
                </div>
                <div class="ml-auto text-gray-300">
                    <i class="w-6 h-6" data-lucide="lock"></i>
                </div>
            </div>

            <!-- 간편 이체 (비활성화 더미) -->
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 flex items-center gap-5 w-full opacity-60">
                <div class="w-14 h-14 bg-gray-200 rounded-full flex shrink-0 items-center justify-center text-gray-400">
                    <i class="w-7 h-7" data-lucide="arrow-right-left"></i>
                </div>
                <div>
                    <h3 class="font-bold text-[18px] text-gray-500 mb-1">간편 이체</h3>
                    <p class="text-[14px] text-gray-400 font-medium">수수료 없는 송금</p>
                </div>
                <div class="ml-auto text-gray-300">
                    <i class="w-6 h-6" data-lucide="lock"></i>
                </div>
            </div>

            <!-- 예적금 가입 (비활성화 더미) -->
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 flex items-center gap-5 w-full opacity-60">
                <div class="w-14 h-14 bg-gray-200 rounded-full flex shrink-0 items-center justify-center text-gray-400">
                    <i class="w-7 h-7" data-lucide="piggy-bank"></i>
                </div>
                <div>
                    <h3 class="font-bold text-[18px] text-gray-500 mb-1">예적금 가입</h3>
                    <p class="text-[14px] text-gray-400 font-medium">맞춤형 목돈 마련</p>
                </div>
                <div class="ml-auto text-gray-300">
                    <i class="w-6 h-6" data-lucide="lock"></i>
                </div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
